apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gatekeeper-library
  namespace: flux-system
spec:
  interval: 24h
  url: https://github.com/open-policy-agent/gatekeeper-library
  ref:
    branch: master
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gatekeeper-library
  namespace: flux-system
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: gatekeeper-library
  path: ./library
  prune: false
  wait: true
  timeout: 5m
