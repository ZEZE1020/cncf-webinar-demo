apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo
  namespace: webinar-demo
spec:
  parentRefs:
    - name: webinar-gateway
  hostnames:
    # Replace METALLB_IP with the Gateway's external IP after deployment
    # e.g. podinfo.10.0.0.100.sslip.io
    - "podinfo.METALLB_IP.sslip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: podinfo
          port: 9898
