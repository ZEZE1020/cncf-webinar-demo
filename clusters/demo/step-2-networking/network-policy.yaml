apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: podinfo-ingress-only
  namespace: webinar-demo
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: podinfo
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kommander
      toPorts:
        - ports:
            - port: "9898"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
