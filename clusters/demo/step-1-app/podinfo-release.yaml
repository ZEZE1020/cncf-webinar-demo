apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: webinar-demo
spec:
  interval: 5m
  chart:
    spec:
      chart: podinfo
      version: "6.*"
      sourceRef:
        kind: HelmRepository
        name: podinfo
      interval: 60m
  values:
    replicaCount: 2
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 64Mi
