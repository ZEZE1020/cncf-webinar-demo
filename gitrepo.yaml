apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: cncf-webinar-demo
  namespace: kommander-flux
spec:
  interval: 1m
  url: https://github.com/WinsonSou/cncf-webinar-demo
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cncf-webinar-demo
  namespace: kommander-flux
spec:
  interval: 5m
  path: ./clusters/demo/flux-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: cncf-webinar-demo
  wait: true